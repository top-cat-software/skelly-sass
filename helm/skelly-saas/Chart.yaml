apiVersion: v2
name: skelly-saas
description: SaaS skeleton framework — umbrella Helm chart
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  # Local sub-charts (in charts/ directory)
  - name: api
    version: "0.1.0"
    repository: "file://charts/api"

  - name: frontend
    version: "0.1.0"
    repository: "file://charts/frontend"

  - name: workers
    version: "0.1.0"
    repository: "file://charts/workers"

  - name: ingress
    version: "0.1.0"
    repository: "file://charts/ingress"

  # Third-party charts
  - name: redis
    version: "21.1.5"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled

  - name: postgresql
    version: "16.7.4"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled

  - name: traefik
    version: "35.3.0"
    repository: https://traefik.github.io/charts
    condition: traefik.enabled

  - name: sealed-secrets
    version: "2.17.1"
    repository: https://bitnami-labs.github.io/sealed-secrets
    condition: sealed-secrets.enabled
