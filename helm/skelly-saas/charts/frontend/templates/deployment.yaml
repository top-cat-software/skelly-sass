apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: skelly-saas
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.global.frontend.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: skelly-saas
    spec:
      serviceAccountName: {{ .Release.Name }}-frontend
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: "{{ .Values.global.frontend.image.repository }}:{{ .Values.global.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.global.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.global.frontend.port | default 3000 }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.global.frontend.port | default 3000 | quote }}
            - name: HOST
              value: "0.0.0.0"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.global.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
