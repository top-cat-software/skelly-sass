apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: skelly-saas
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound from Traefik only
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: {{ .Values.global.frontend.port | default 3000 }}
  egress:
    # Allow DNS resolution only — frontend has no direct backend access
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
