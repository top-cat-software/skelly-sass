apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/part-of: skelly-saas
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.global.ingress.apiHost | default "api.localhost" }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}-api
          port: {{ .Values.global.api.port | default 8080 }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/part-of: skelly-saas
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.global.ingress.appHost | default "app.localhost" }}`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}-frontend
          port: {{ .Values.global.frontend.port | default 3000 }}
