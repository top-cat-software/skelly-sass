apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-workers
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/part-of: skelly-saas
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.global.workers.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workers
        app.kubernetes.io/part-of: skelly-saas
    spec:
      serviceAccountName: {{ .Release.Name }}-workers
      terminationGracePeriodSeconds: {{ .Values.global.workers.terminationGracePeriodSeconds | default 60 }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workers
          image: "{{ .Values.global.workers.image.repository }}:{{ .Values.global.workers.image.tag }}"
          imagePullPolicy: {{ .Values.global.workers.image.pullPolicy }}
          command:
            {{- toYaml .Values.global.workers.command | nindent 12 }}
          args:
            {{- toYaml .Values.global.workers.args | nindent 12 }}
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-api-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-api-config
                  key: APP_DEBUG
            - name: APP_SECRET
              value: "skeleton-dev-secret-change-in-production"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.global.postgresql.auth.username }}:{{ .Values.global.postgresql.auth.password }}@{{ .Release.Name }}-pgbouncer:6432/{{ .Values.global.postgresql.auth.database }}?serverVersion=16&charset=utf8"
            - name: REDIS_URL
              value: "redis://:{{ .Values.global.redis.auth.password }}@{{ .Release.Name }}-redis-master:6379"
            - name: MESSENGER_TRANSPORT_DSN
              value: "redis://:{{ .Values.global.redis.auth.password }}@{{ .Release.Name }}-redis-master:6379/messages"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: var
              mountPath: /app/var
          resources:
            {{- toYaml .Values.global.workers.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: var
          emptyDir: {}
