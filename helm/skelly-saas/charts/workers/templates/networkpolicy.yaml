apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-workers
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/part-of: skelly-saas
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workers
  policyTypes:
    - Ingress
    - Egress
  ingress: []
    # Workers accept no inbound traffic
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Allow outbound to Redis
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
