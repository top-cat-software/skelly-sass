# Development overrides for local k3d cluster.
# Usage: helm install skelly-saas helm/skelly-saas -f helm/skelly-saas/values-dev.yaml

global:
  api:
    replicas: 1
    env:
      APP_ENV: dev
      APP_DEBUG: "1"

  frontend:
    replicas: 1

  workers:
    replicas: 1

traefik:
  ingressRoute:
    dashboard:
      enabled: true
